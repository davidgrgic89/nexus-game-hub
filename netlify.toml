# Netlify configuration for Nexus Game Hub (static PWA + serverless Steam proxy)
[build]
  publish = "."                     # static site lives at the repo root (index.html)
  # Recompile Tailwind so styles.css matches the current classes. Non-fatal: if the
  # build ever hiccups, the committed styles.css still ships and the deploy (incl.
  # the serverless function) is never blocked.
  command = "npm run build:css || echo 'css rebuild skipped — shipping committed styles.css'"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[build.environment]
  NODE_VERSION = "20"    # ensure global fetch() is available in functions
