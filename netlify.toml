# Netlify configuration for Nexus Game Hub (static PWA + serverless Steam proxy)
[build]
  publish = "."                     # static site lives at the repo root (index.html)
  command = "npm run build:css"     # recompile Tailwind so styles.css always matches
                                    # the current classes (the committed styles.css is a
                                    # fallback for local/file:// use and if a build is skipped)

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[build.environment]
  NODE_VERSION = "20"    # ensure global fetch() is available in functions
